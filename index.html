<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>モンキーターン V</title>
  <meta name="theme-color" content="#f7f7f8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="モンキーターン V" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <section id="home" class="screen active">
      <header class="app-header">
        <h1>モンキーターン V</h1>
        <button class="icon-button" id="openSettings" aria-label="設定">⚙︎</button>
      </header>

      <main>
        <div id="counterList" class="list"></div>

        <div class="list nav-list">
          <button id="rareNav" class="nav-row hidden">
            <span>レア小役</span>
            <span class="chev">›</span>
          </button>
          <button id="judgeNav" class="nav-row">
            <span>設定判別</span>
            <span class="chev">›</span>
          </button>
        </div>
      </main>
    </section>

    <section id="settings" class="screen">
      <header class="app-header three">
        <button class="text-button back" data-screen="home">戻る</button>
        <h1>設定</h1>
        <span></span>
      </header>

      <main>
        <div class="section-label">表示項目</div>
        <div class="list" id="displaySettings"></div>

        <div class="section-label">ゲーム数ボタン</div>
        <div class="list">
          <label class="setting-row">
            <span>＋ボタン</span>
            <select id="gamePlusStep"></select>
          </label>
          <label class="setting-row">
            <span>－ボタン</span>
            <select id="gameMinusStep"></select>
          </label>
        </div>

        <div class="section-label">データ管理</div>
        <div class="list">
          <div class="setting-row">
            <span>実戦データをリセット</span>
            <button class="danger-button" id="resetData">リセット</button>
          </div>
        </div>
        <p class="note">表示を外しても、内部データは残ります。リセットを押した場合のみ初期化されます。</p>
      </main>
    </section>

    <section id="judge" class="screen">
      <header class="app-header three">
        <button class="text-button back" data-screen="home">戻る</button>
        <h1>設定判別</h1>
        <span></span>
      </header>

      <main>
        <div class="list">
          <div class="judge-block">
            <div class="block-title">設定期待度</div>
            <div id="probBars"></div>
          </div>
          <div id="judgeDetails"></div>
        </div>
        <p class="note">入力値と内蔵値からの簡易計算です。断定表現は表示しません。</p>
      </main>
    </section>

    <section id="rare" class="screen">
      <header class="app-header three">
        <button class="text-button back" data-screen="home">戻る</button>
        <h1>レア小役</h1>
        <span></span>
      </header>

      <main>
        <div class="list" id="rareList"></div>
      </main>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
