<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><title>モンキーターン V</title><meta name="theme-color" content="#f7f7f8"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="モンキーターン V"><link rel="manifest" href="./manifest-v04.json"><link rel="stylesheet" href="./style-v04.css"></head><body><div class="app">
<section id="home" class="screen active"><header class="app-header"><h1>モンキーターン V</h1><button class="icon-button" id="openSettings">⚙︎</button></header><main><div id="homeList" class="list"></div><div class="list nav-list"><button id="judgeNav" class="nav-row"><span>設定判別</span><span class="chev">›</span></button></div><p class="version">v0.4</p></main></section>
<section id="settings" class="screen"><header class="app-header three"><button class="text-button back" data-screen="home">戻る</button><h1>設定</h1><span></span></header><main><div class="section-label">表示項目</div><div class="list" id="displaySettings"></div><div class="section-label">ゲーム数ボタン</div><div class="list"><label class="setting-row"><span>＋ボタン</span><select id="gamePlusStep"></select></label><label class="setting-row"><span>－ボタン</span><select id="gameMinusStep"></select></label></div><div class="section-label">データ管理</div><div class="list"><div class="setting-row"><span>実戦データをリセット</span><button class="danger-button" id="resetData">リセット</button></div></div><p class="note">表示を外してもデータは残ります。リセットを押した場合のみ初期化されます。</p></main></section>
